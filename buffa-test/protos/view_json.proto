// Proto for view JSON round-trip tests (issue #83).
// Intentionally avoids most WKT imports — WKT view Serialize is a separate
// follow-up; see CHANGELOG.md. NullValue is imported only because it is a
// proto enum (not a message), so its view variant is an i32, not a view struct,
// and does not trigger the WKT-view-Serialize compile gap.

syntax = "proto3";

package test.viewjson;

import "google/protobuf/struct.proto";

enum Color {
  COLOR_UNSPECIFIED = 0;
  RED = 1;
  GREEN = 2;
  BLUE = 3;
}

message Scalars {
  int32 i32 = 1;
  int64 i64 = 2;
  uint32 u32 = 3;
  uint64 u64 = 4;
  float f32 = 5;
  double f64 = 6;
  bool b = 7;
  string s = 8;
  bytes by = 9;
}

message WithEnum {
  Color color = 1;
  repeated Color colors = 2;
}

message WithOneof {
  oneof value {
    string text = 1;
    int64 number = 2;
    bytes data = 3;
    Color color = 4;
    google.protobuf.NullValue null_val = 5;
  }
}

message WithMaps {
  map<string, string> labels = 1;
  map<int32, string> by_id = 2;
  map<string, int64> counts = 3;
  map<string, Color> by_color = 4;
}

message Inner {
  int32 x = 1;
  string name = 2;
}

message Outer {
  Inner inner = 1;
  repeated Inner items = 2;
  int64 id = 3;
}
