syntax = "proto3";

package vtable_bytes_repr;

// Built with a crate-local LocalBytes representation, vtable reflection, and
// JSON. The repeated chunks field is a vector of LocalBytes, which exercises the
// codegen-emitted ReflectElement and base64 ProtoElemJson element impls; those
// compile only because the type is local. The singular head field reflects via
// deref and uses the bytes JSON with-module.
message Blob {
  bytes head = 1;
  repeated bytes chunks = 2;
}
