kind: Fixed
body: 'The lazy view family now applies the element-memory budget. Four gaps composed: generated `decode_lazy` built its context without one, neither the repeated nor the singular message arm charged, and each deferred access rebuilt a context that dropped it — so `DecodeOptions::with_element_memory_limit` had no effect on this family at all. Recording a deferred element or fragment is now charged for the byte-range slot it retains, and the budget remaining at the record site is replayed when the subtree is accessed. Like the recursion and unknown-field limits on this path, the element budget is a per-subtree bound rather than the eager decoder global cap; the rustdoc and guide say so, and the three affected `# Errors` lists now name `ElementMemoryLimitExceeded`.'
