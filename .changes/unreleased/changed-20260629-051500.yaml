kind: Changed
body: 'Packed varint-family repeated fields (`int32`/`int64`/`uint32`/`uint64`/`sint32`/`sint64`/`bool`, and open enums) now decode each element through new force-inlined `buffa::types::decode_*_packed` helpers, removing the per-element out-of-line call from the generated packed loops. Measured on a quieted bare-metal A/B at the layout-normalized profile: −16–30% on packed-varint-dense decode/merge and −5–19% on `decode_view` across every benchmark shape (via the resulting `decode_varint` code-placement shift), at the cost of ~+2–4% on one dense-small-message synthetic (`google_message1` owned decode/merge). Pair regenerated code with a buffa runtime that has the `decode_*_packed` helpers — code generated by this `buffa-codegen` does not compile against older runtimes, so a stale lockfile resolving an older caret version fails with `cannot find function decode_*_packed`; `cargo update -p buffa` fixes it. The plain `decode_*` helpers are unchanged.'
