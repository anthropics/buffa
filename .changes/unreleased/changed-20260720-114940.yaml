kind: Changed
body: |-
    **`UnknownFieldsView` holds its records behind a pointer, so a view carrying none costs a null** (#NNN).
    Every generated view embeds this type by value. Holding the records inline made each view an owning aggregate, which the compiler moves with out-of-line `memcpy` calls rather than inline vector stores, and that cost view-decode throughput even on payloads that never carry an unknown field. The state now lives behind a `Box`, allocated when the first unknown record arrives.
    Measured on `google_message1_proto3/decode_view` on a quiesced bare-metal host, as the mean of four code-alignment layouts: a payload with no unknown fields decodes ~10% faster, one whose top-level view carries them ~3% faster, and one carrying them at every nesting level ~3% slower, since each such view pays an allocation. Public API, wire behaviour and `Debug` output are unchanged.
