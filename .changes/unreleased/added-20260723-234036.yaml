kind: Added
body: Added a defaulted `SingularCodec::decode_one_ctx`, so repeated extension elements can share one decode budget. Existing implementations need no change; the default forwards to `decode_one`, which is correct for any codec with a fixed per-record cost. A codec whose value can materialize an unbounded subtree must override it.
