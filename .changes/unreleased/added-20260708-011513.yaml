kind: Added
body: '**Path-scoped closed-enum open representation** via `open_enums_in`. Builds can opt selected closed enums (or individual closed enum fields) into `EnumValue<E>` codegen, making unknown wire values directly visible as `EnumValue::Unknown(n)` for prost-parity migrations or memory-optimized builds with `preserve_unknown_fields(false)`. Implemented as descriptor feature injection (`features.enum_type = OPEN`), so the embedded reflection descriptor pool agrees with the generated types. The option is default-off; default closed-enum semantics are unchanged. (#269)'
