kind: Fixed
body: Code fences in proto comments are no longer compiled as doctests in the consuming crate. An unannotated fence becomes `text` and any other gains `ignore` (keeping its language, so a `rust` fence is still syntax-highlighted); `ignore-<target>` tokens are dropped, since rustdoc treats them as a target list that replaces a plain `ignore`. Tilde fences (`~~~`) are inerted the same way as backtick fences, since rustdoc's markdown parser compiles them too. Fence open/close detection now follows CommonMark, and an unterminated fence is closed at the end of the comment instead of swallowing the doc text after it. (#307)
