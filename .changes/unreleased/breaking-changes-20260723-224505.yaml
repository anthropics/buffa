kind: Breaking changes
body: 'Deduplicating a `MapView` now requires `Ord` on the key: `MapView::iter_unique`, `MapView::len_unique`, and the `ReflectMapKey` supertrait all move from `PartialEq` to `Ord`. Every key type in the spec-valid set already satisfies it, but a **custom string newtype used as a `map` key under `generate_reflection_vtable`** does not automatically — codegen emits `impl ReflectMapKey` for it, and `ProtoString` does not require `Ord`. Such a newtype now needs to derive `Ord`.'
time: 2026-07-23T22:45:05.976557579-07:00
