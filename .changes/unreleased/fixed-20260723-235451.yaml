kind: Fixed
body: 'A fully-qualified symbol name is now capped at `MAX_SYMBOL_LEN` (512 bytes, matching protoc), which bounds two things in `DescriptorPool` construction — work that happens after decode and that none of the decode budgets cover. Names are built by concatenating the parent name, and every descendant stores its own copy four times over, so a deep prefix is paid once on the wire and once per descendant; a message name is a singular field, so the element budget never charged for it. The cap also bounds nesting: construction walks nested messages recursively in four places with no depth counter, each level adds at least one byte to the name, and the cap is reached in pass 1 before the other three walks run. That closes the unbounded recursion reachable through the public `DescriptorPool::new`, which takes an already-decoded set and so is not covered by the decoder recursion limit. The cap applies to registered symbol names — messages, enums, enum values, services, methods, extensions — not to leaf field or oneof names, whose amplification is linear rather than quadratic.'
