kind: Changed
body: Corrected two decode-limit documentation claims that measurement contradicts. The unknown-field count limit was described as capping overhead at roughly `limit x 40` bytes; that prices a flat field, and each unknown group additionally allocates a `Vec` whose minimum non-zero capacity is four elements, so a payload of many shallow groups reaches about five times that. And the `Map` hasher docs described the foldhash process-wide seed as mixing ASLR addresses with process start time; that holds on `std`, but `no_std` builds drop the clock and allocator entropy, and on a bare-metal target with no ASLR the seed is a link-time constant, so a colliding key set can be precomputed from the firmware image. Both are documentation-only; no behaviour changes.
