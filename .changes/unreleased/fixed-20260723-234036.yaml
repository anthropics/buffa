kind: Fixed
body: 'An extension field decoded through `MessageCodec` or `GroupCodec`, in either the singular or repeated form, now shares one decode budget across all of its wire records. `Message::merge_from_slice` mints fresh budget cells per call, so merging records one at a time gave every record its own full unknown-field and element-memory allowance — turning documented per-decode absolutes into per-record ones, multiplied by however many records the sender chose to send. The carrier sees only opaque records and charges one slot each, so nothing upstream noticed. Reachable from `ExtensionSet::extension` and, with no explicit call, from `serde_json::to_string` on a message carrying a registered extension. New failure mode: an extension whose records together exhaust the budget now reads as absent (or yields a short list), which the getter rustdoc now says. The budget is always the crate default — `ExtensionSet::extension` takes no context, so a `DecodeOptions` used for the carrier does not reach it.'
