kind: Changed
body: '`DescriptorPool` now rejects descriptor sets with ambiguous field identities instead of building a pool whose lookups are undefined: two fields in a message sharing a number or a proto name, and a `oneof_index` that names no oneof in the containing message. The last of these also fixes a real bug — an out-of-`u16` index was silently dropped, leaving the field with oneof presence but no oneof membership. Fields resolving to the same JSON name are rejected only where protobuf treats JSON as fully supported (`json_format = ALLOW`, i.e. proto3 and editions) and the message has not set `deprecated_legacy_json_field_conflicts`, so every descriptor set protoc emits still loads. protoc rejects the rest at compile time. (#300)'
